name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-arm64
            os: macos-latest
            goos: darwin
            goarch: arm64
            artifact: solidjs-wails-template-macos-arm64
          - name: macos-intel
            os: macos-latest
            goos: darwin
            goarch: amd64
            artifact: solidjs-wails-template-macos-intel
          # - name: windows-amd64
          #   os: windows-latest
          #   goos: windows
          #   goarch: amd64
          #   artifact: solidjs-wails-template-windows-amd64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> "$GITHUB_OUTPUT"

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('frontend/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      # Windows needs GCC for CGO (go-sqlite3)
      - name: Install mingw-w64 (Windows)
        if: runner.os == 'Windows'
        run: choco install mingw -y

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@latest

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: wails3 build GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }}

      - name: Build (Windows)
        if: runner.os == 'Windows'
        env:
          CC: gcc
          CGO_ENABLED: "1"
        run: wails3 build GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }}

      - name: Package artifact (macOS)
        if: runner.os == 'macOS'
        run: |
          zip -j build/bin/${{ matrix.artifact }}.zip build/bin/solidjs-wails-template

      - name: Package artifact (Windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path build/bin/solidjs-wails-template.exe -DestinationPath build/bin/${{ matrix.artifact }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: build/bin/${{ matrix.artifact }}.zip
          retention-days: 1

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/**/*.zip
